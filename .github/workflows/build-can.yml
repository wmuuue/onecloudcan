name: Build Full Kernel Modules for CAN

on:
  workflow_dispatch:

jobs:
  build-can:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential gcc g++ make \
        bc bison flex libssl-dev libncurses-dev \
        python3 python3-distutils rsync device-tree-compiler \
        gcc-arm-linux-gnueabihf

    - name: Verify cross compiler
      run: arm-linux-gnueabihf-gcc --version

    - name: Download Linux 6.6.21
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.21.tar.xz
        tar xf linux-6.6.21.tar.xz

    - name: Copy kernel config
      run: |
        cp config/linux-meson-current.config linux-6.6.21/.config

    - name: Prepare kernel
      run: |
        cd linux-6.6.21
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- olddefconfig
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- modules_prepare

    - name: Build all kernel modules
      run: |
        cd linux-6.6.21
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- modules -j$(nproc)

    - name: Collect CAN modules
      run: |
        mkdir -p output
        find linux-6.6.21/drivers/net/can -name "*.ko" -exec cp {} output/ \;

    - name: Upload CAN modules artifact
      uses: actions/upload-artifact@v4
      with:
        name: can-modules
        path: output/
